<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cruise Countdown</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="widget-shell" aria-label="Cruise countdown widget">
      <section class="countdown" aria-label="Cruise countdown">
        <div>
          <div class="countdown-title">Norwegian Viva Sailaway</div>
          <div class="countdown-subtitle">Istanbul · Friday, June 5, 2026 · 5:00 PM</div>
        </div>
        <div class="countdown-values" aria-live="polite">
          <div class="countdown-unit">
            <div class="countdown-number" id="days">--</div>
            <div class="countdown-label">Days</div>
          </div>
          <div class="countdown-unit">
            <div class="countdown-number" id="hours">--</div>
            <div class="countdown-label">Hours</div>
          </div>
          <div class="countdown-unit">
            <div class="countdown-number" id="minutes">--</div>
            <div class="countdown-label">Minutes</div>
          </div>
          <div class="countdown-unit">
            <div class="countdown-number" id="seconds">--</div>
            <div class="countdown-label">Seconds</div>
          </div>
        </div>
      </section>
    </main>

    <script src="/assets/widgets.js"></script>
    <script>
      startCountdown();
    </script>
  </body>
</html>
